<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Comiko</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>

/* ROOT */
:root {
  --bg: #ffffff;
  --primary: #FF5A0A;
  --text: #000000;
  --muted: #555;
  --border: #eaeaea;
}

/* GLOBAL */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-text-stroke: 0.3px rgba(0,0,0,0.2);
}

body {
  font-family: "Comic Sans MS", cursive, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  background: white;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  padding: 20px 10%;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 20px;
}

.nav-links a {
  margin-left: 30px;
  text-decoration: none;
  color: black;
}

/* MAIN FULLSCREEN FIX */
.container {
  height: calc(100vh - 70px);
  display: flex;
  align-items: center;
  padding: 0 10%;
}

/* LAYOUT */
.contact-layout {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

/* LEFT TEXT */
.left-text h1 {
  font-family: 'Bangers', cursive;
  font-size: 100px;
  color: var(--primary);
  text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  -webkit-text-stroke: 1px black;
  margin-bottom: 20px;
}

.left-text p {
  font-size: 18px;
  max-width: 400px;
}

/* FORM */
.form {
  width: 100%;
}

.input {
  width: 100%;
  padding: 15px;
  margin-bottom: 20px;
  border: 2px solid black;
  font-size: 14px;
  outline: none;
}

textarea {
  height: 150px;
  resize: none;
}

.btn {
  padding: 12px 30px;
  border: 2px solid black;
  background: var(--primary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* FOOTER FIXED */
.footer {
  height: 100vh;
  width: 100vw;
  margin-left: calc(vw);
  padding: 120px 10% ;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.footer-top p {
  color: #aaa;
  margin-bottom: 20px;
}

.footer-top h1 {
  font-family: 'Bangers', cursive;
  font-size: 140px;
  cursor: pointer;
  transition: 0.3s;
  text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
}

.footer-top h1:hover {
  transform: translateX(20px);
  color: var(--primary);
}

.footer-bottom {
  border-top: 1px solid #333;
  padding-top: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.footer-links a {
  margin-left: 20px;
  color: white;
  text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .contact-layout {
    grid-template-columns: 1fr;
  }
  .left-text h1 {
    font-size: 60px;
  }
  .container {
    height: auto;
    padding: 80px 10%;
  }
}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo">COMIKO</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="generate.html">Generate</a>
  </div>
</div>

<div class="container">

<div class="contact-layout">

  <!-- LEFT -->
  <div class="left-text">
    <h1>LET US KNOW</h1>
    <p>Tell us your issue and we’ll help you solve it quickly and clearly.</p>
  </div>

  <!-- RIGHT -->
  <div class="form">
    <input type="text" class="input" placeholder="Your Name">
    <input type="email" class="input" placeholder="Your Email">
    <textarea class="input" placeholder="Describe your issue..."></textarea>
    <button class="btn">Send Message</button>
  </div>

</div>

</div>

<footer class="footer">

  <div class="footer-top">
    <p>Facing any issues? Let us know.</p>
    <h1 onclick="location.href='generate.html'">GENERATE SOME COMIC ↗</h1>
  </div>

  <div class="footer-bottom">
    <div>Comiko © 2026</div>
    <div class="footer-links">
      <a href="generate.html">Generate</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

</footer>

</body>
</html>
